<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #111827; font-family: 'Inter', sans-serif; }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 80px; padding: 0 48px; background: #111827;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
  }
  .logo img { height: 32px; filter: invert(1); }
  .menu { display: flex; gap: 32px; align-items: center; }
  .menu a { color: #fff; font-size: 18px; font-weight: 500; text-decoration: none; letter-spacing: -0.01em; }
  .contact { display: flex; align-items: center; gap: 6px; }
  .contact img { width: 20px; height: 20px; filter: invert(1); }
</style>
</head><body>
  <nav>
    <div class="logo">
      <img src="../assets/julian-aijal-logo.svg" alt="Julian Aijal">
    </div>
    <div class="menu">
      <a href="#">Scripting</a>
      <a href="#">Ramblings</a>
      <div class="contact">
        <img src="../assets/icons/envelope.svg" alt="">
        <a href="#">Ping me!</a>
      </div>
    </div>
  </nav>
</body></html>
