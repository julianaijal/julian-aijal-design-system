<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #111827; font-family: 'Inter', sans-serif; }
  footer {
    display: flex; align-items: center; justify-content: space-between;
    height: 112px; padding: 0 48px; background: #111827;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .ping { font-size: 32px; font-weight: 700; color: #fff; letter-spacing: -0.01em; display: flex; align-items: center; gap: 12px; }
  .ping img { width: 36px; height: 36px; filter: invert(1); }
  .logo img { height: 32px; filter: invert(1); }
  .social { display: flex; gap: 16px; align-items: center; }
  .social img { width: 28px; height: 28px; filter: invert(1); opacity: 0.8; }
</style>
</head><body>
  <footer>
    <div class="ping">
      <img src="../assets/icons/envelope.svg" alt="">
      Ping me!
    </div>
    <div class="logo">
      <img src="../assets/julian-aijal-logo.svg" alt="Julian Aijal">
    </div>
    <div class="social">
      <img src="../assets/icons/github.svg" alt="GitHub">
      <img src="../assets/icons/linkedin.svg" alt="LinkedIn">
      <img src="../assets/icons/x.svg" alt="X">
      <img src="../assets/icons/instagram.svg" alt="Instagram">
      <img src="../assets/icons/bluesky.svg" alt="Bluesky">
      <img src="../assets/icons/threads.svg" alt="Threads">
      <img src="../assets/icons/tiktok.svg" alt="TikTok">
    </div>
  </footer>
</body></html>
