<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #111827; font-family: 'Inter', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 28px; }
  .lbl { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }

  /* ── Showcase card ── */
  .sc { position: relative; width: 360px; height: 280px; border-radius: 8px; background: rgba(255,255,255,0.1); overflow: hidden; flex-shrink: 0; box-shadow: 0 20px 24px rgba(0,0,0,0.1); }
  .sc--hover { border: 1px solid rgba(255,255,255,0.5); }
  .sc__img  { position: absolute; left: 16px; top: 16px; width: 328px; height: 184.5px; border-radius: 4px; overflow: hidden; }
  .sc__img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .sc__title{ position: absolute; left: 16px; top: 217px; font-size: 18px; font-weight: 700; line-height: 22px; letter-spacing: -0.01em; color: #fff; }
  .sc__cat  { position: absolute; left: 16px; top: 244px; font-size: 16px; line-height: 20px; letter-spacing: -0.01em; color: rgba(255,255,255,0.5); }
  .sc__plus { position: absolute; left: 312px; top: 222px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .sc__plus img { width: 24px; height: 24px; }

  /* ── Article card ── */
  .ac { position: relative; width: 744px; height: 136px; border-radius: 6px; border: 1px solid #6f39ff; overflow: hidden; }
  .ac__bg   { position: absolute; inset: 0; background: url('../assets/article-card-texture.png') center / cover no-repeat; }
  .ac__icon { position: absolute; left: 24px; top: 24px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
  .ac__icon img { width: 39px; height: auto; filter: brightness(0) invert(1); }
  .ac__text { position: absolute; left: 96px; top: 24px; width: 505px; }
  .ac__title{ font-size: 24px; font-weight: 700; line-height: 30px; letter-spacing: -0.01em; color: #111827; }
  .ac__sub  { margin-top: 4px; font-size: 16px; line-height: 24px; letter-spacing: -0.01em; color: rgba(17,24,39,0.5); }
  .ac__btn  { position: absolute; left: 625px; top: 24px; width: 95px; height: 30px; border-radius: 3px; background: rgba(111,57,255,0.15); border: 1px solid #6f39ff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; letter-spacing: 0.02em; color: #6f39ff; }
</style>
</head>
<body>

  <!-- Showcase cards: default + hover -->
  <div>
    <div class="row">
      <div>
        <div class="sc">
          <div class="sc__img"><img src="../assets/project-screenshot.jpg" alt=""></div>
          <div class="sc__title">The Next Web</div>
          <div class="sc__cat">Media &amp; Events</div>
          <div class="sc__plus"><img src="../assets/icons/plus.svg" alt=""></div>
        </div>
        <div class="lbl">Showcase card — default</div>
      </div>
      <div>
        <div class="sc sc--hover">
          <div class="sc__img"><img src="../assets/project-screenshot.jpg" alt=""></div>
          <div class="sc__title">The Next Web</div>
          <div class="sc__cat">Media &amp; Events</div>
          <div class="sc__plus"><img src="../assets/icons/plus.svg" alt=""></div>
        </div>
        <div class="lbl">Showcase card — hover (white border)</div>
      </div>
    </div>
  </div>

  <!-- Article card -->
  <div>
    <div class="ac">
      <div class="ac__bg"></div>
      <div class="ac__icon"><img src="../assets/icons/chart.svg" alt=""></div>
      <div class="ac__text">
        <div class="ac__title">What is a knowledge graph and how does one work?</div>
        <div class="ac__sub">It will do wonders for your SEO strategy.</div>
      </div>
      <div class="ac__btn">Read more</div>
    </div>
    <div class="lbl">Article card — 744×136 · purple border · texture bg · dark text</div>
  </div>

</body></html>
