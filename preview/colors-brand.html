<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #111827; font-family: 'Inter', sans-serif; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .chip { width: 72px; height: 72px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); }
  .name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 0.02em; text-transform: uppercase; }
  .hex  { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
  .gradient-chip { width: 160px; height: 72px; border-radius: 8px; background: linear-gradient(90deg, #6f39ff 0%, #35b8fe 100%); }
</style>
</head><body>
<div class="row">
  <div class="swatch">
    <div class="chip" style="background:#111827; border:1px solid rgba(255,255,255,0.2)"></div>
    <div class="name">bg</div><div class="hex">#111827</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#6f39ff"></div>
    <div class="name">purple</div><div class="hex">#6f39ff</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#9747ff"></div>
    <div class="name">purple-mid</div><div class="hex">#9747ff</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#35b8fe"></div>
    <div class="name">blue</div><div class="hex">#35b8fe</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#ff641e"></div>
    <div class="name">orange</div><div class="hex">#ff641e</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#fbbc04"></div>
    <div class="name">yellow</div><div class="hex">#fbbc04</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#71c8df"></div>
    <div class="name">teal</div><div class="hex">#71c8df</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#2a88c9"></div>
    <div class="name">mid-blue</div><div class="hex">#2a88c9</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#858585"></div>
    <div class="name">grey</div><div class="hex">#858585</div>
  </div>
  <div class="swatch">
    <div class="gradient-chip"></div>
    <div class="name">brand gradient</div><div class="hex">#6f39ff → #35b8fe</div>
  </div>
</div>
</body></html>
