<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #111827; font-family: 'Inter', sans-serif; padding: 20px; }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .item { display: flex; align-items: baseline; gap: 12px; }
  .size { font-size: 10px; color: rgba(255,255,255,0.35); width: 32px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; }
  .bar { height: 2px; background: rgba(111,57,255,0.4); align-self: center; flex-shrink: 0; border-radius: 1px; }
  .text { color: white; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: auto; flex-shrink: 0; }
</style>
</head><body>
<div class="row">
  <div class="item">
    <div class="size">56</div>
    <div class="bar" style="width:56px"></div>
    <div class="text" style="font-size:56px;font-weight:700;line-height:1">Hi, I'm Julian</div>
  </div>
  <div class="item">
    <div class="size">40</div>
    <div class="bar" style="width:40px"></div>
    <div class="text" style="font-size:40px;font-weight:700;line-height:1">Scripting</div>
    <div class="meta">Section heading</div>
  </div>
  <div class="item">
    <div class="size">32</div>
    <div class="bar" style="width:32px"></div>
    <div class="text" style="font-size:32px;font-weight:700;line-height:1">Ping me!</div>
    <div class="meta">Footer CTA</div>
  </div>
  <div class="item">
    <div class="size">24</div>
    <div class="bar" style="width:24px"></div>
    <div class="text" style="font-size:24px;font-weight:400;line-height:1">Lead body copy</div>
    <div class="meta">Lead</div>
  </div>
  <div class="item">
    <div class="size">18</div>
    <div class="bar" style="width:18px"></div>
    <div class="text" style="font-size:18px;font-weight:500;line-height:1">Nav item / body text</div>
    <div class="meta">Base</div>
  </div>
  <div class="item">
    <div class="size">16</div>
    <div class="bar" style="width:16px"></div>
    <div class="text" style="font-size:16px;font-weight:400;line-height:1">Card subtitle / caption</div>
    <div class="meta">Small</div>
  </div>
  <div class="item">
    <div class="size">14</div>
    <div class="bar" style="width:14px"></div>
    <div class="text" style="font-size:14px;font-weight:700;letter-spacing:0.02em;line-height:1">READ MORE</div>
    <div class="meta">Label</div>
  </div>
</div>
</body></html>
