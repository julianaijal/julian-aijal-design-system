<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #111827; font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .icon-wrap { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
  .icon-wrap img { width: 100%; height: 100%; object-fit: contain; filter: brightness(0) invert(1); }
  .name { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.02em; text-transform: uppercase; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); }
  .logo-wrap { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 20px; display: inline-flex; }
  .logo-wrap img { height: 28px; }
</style>
</head>
<body>

  <div>
    <div class="section-label">UI icons — all white on dark</div>
    <div class="grid">
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/envelope.svg" alt=""></div><div class="name">envelope</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/chart.svg" alt=""></div><div class="name">chart</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/cloud.svg" alt=""></div><div class="name">cloud</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/table.svg" alt=""></div><div class="name">table</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/plus.svg" alt=""></div><div class="name">plus</div></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-label">Social icons</div>
    <div class="grid">
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/github.svg" alt=""></div><div class="name">github</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/linkedin.svg" alt=""></div><div class="name">linkedin</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/x.svg" alt=""></div><div class="name">x</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/instagram.svg" alt=""></div><div class="name">instagram</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/bluesky.svg" alt=""></div><div class="name">bluesky</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/threads.svg" alt=""></div><div class="name">threads</div></div>
      <div class="item"><div class="icon-wrap"><img src="../assets/icons/tiktok.svg" alt=""></div><div class="name">tiktok</div></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-label">Logo</div>
    <div class="logo-wrap">
      <img src="../assets/julian-aijal-logo.svg" alt="Julian Aijal" style="filter:none">
    </div>
  </div>

</body></html>
